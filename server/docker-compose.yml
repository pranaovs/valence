services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: valance
      POSTGRES_PASSWORD: valance_dev
      POSTGRES_DB: valance
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U valance"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build: .
    ports:
      - "3000:3000"
    env_file: .env
    environment:
      DATABASE_URL: postgres://valance:valance_dev@postgres:5432/valance
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["node", "dist/index.js"]

  worker:
    build: .
    env_file: .env
    environment:
      DATABASE_URL: postgres://valance:valance_dev@postgres:5432/valance
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["node", "dist/worker.js"]

volumes:
  pgdata:
